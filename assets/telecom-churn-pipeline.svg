<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">AI-Powered Telecom Churn Prevention Pipeline</title>
  <desc id="desc">A workflow diagram showing how telecom customer data becomes churn-risk ranking and retention actions.</desc>
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      text { font-family: Arial, Helvetica, sans-serif; }
      .title { font-weight: 700; font-size: 56px; fill: #102a43; }
      .subtitle { font-weight: 400; font-size: 25px; fill: #52606d; }
      .section { font-weight: 700; font-size: 25px; fill: #102a43; }
      .label { font-weight: 700; font-size: 26px; fill: #1f2933; }
      .small { font-weight: 400; font-size: 20px; fill: #52606d; }
      .tiny { font-weight: 400; font-size: 17px; fill: #627d98; }
      .metric { font-weight: 700; font-size: 33px; fill: #047857; }
      .chip { font-weight: 700; font-size: 17px; fill: #334e68; }
      .box { stroke-width: 3; rx: 18; }
      .line { fill: none; stroke: #486581; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; }
      .arrow { fill: #486581; }
    </style>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="9" stdDeviation="10" flood-color="#102a43" flood-opacity="0.12"/>
    </filter>
    <marker id="arrowhead" markerWidth="14" markerHeight="10" refX="12" refY="5" orient="auto">
      <path d="M 0 0 L 14 5 L 0 10 z" class="arrow"/>
    </marker>
  </defs>

  <rect class="bg" width="1600" height="900"/>
  <circle cx="1435" cy="125" r="135" fill="#d9f99d" opacity="0.55"/>
  <circle cx="80" cy="775" r="170" fill="#bfdbfe" opacity="0.55"/>

  <text x="90" y="92" class="title">AI-Powered Telecom Churn Prevention</text>
  <text x="92" y="132" class="subtitle">Final assignment project for GCI World 2026 Spring | Company A telecom dataset</text>

  <g filter="url(#shadow)">
    <rect x="95" y="210" width="250" height="170" class="box" fill="#fff7ed" stroke="#c2410c"/>
    <rect x="430" y="210" width="270" height="170" class="box" fill="#dbeafe" stroke="#1d4ed8"/>
    <rect x="785" y="210" width="285" height="170" class="box" fill="#ecfdf5" stroke="#047857"/>
    <rect x="1155" y="210" width="315" height="170" class="box" fill="#ede9fe" stroke="#6d28d9"/>
  </g>

  <text x="220" y="258" text-anchor="middle" class="label">Raw Data</text>
  <text x="220" y="298" text-anchor="middle" class="small">Client.csv + Record.csv</text>
  <text x="220" y="329" text-anchor="middle" class="small">100,000 customers</text>
  <text x="220" y="356" text-anchor="middle" class="tiny">billing, usage, handset, service</text>

  <text x="565" y="248" text-anchor="middle" class="label">Feature Engineering</text>
  <text x="565" y="289" text-anchor="middle" class="small">usage trend ratios</text>
  <text x="565" y="320" text-anchor="middle" class="small">equipment age signals</text>
  <text x="565" y="351" text-anchor="middle" class="small">call failure and care intensity</text>

  <text x="928" y="248" text-anchor="middle" class="label">ML Ranking Model</text>
  <text x="928" y="289" text-anchor="middle" class="small">65% engineered LightGBM</text>
  <text x="928" y="320" text-anchor="middle" class="small">35% CatBoost ensemble</text>
  <text x="928" y="351" text-anchor="middle" class="small">validation-selected architecture</text>

  <text x="1312" y="248" text-anchor="middle" class="label">Retention Action</text>
  <text x="1312" y="289" text-anchor="middle" class="small">weekly churn-risk score</text>
  <text x="1312" y="320" text-anchor="middle" class="small">target top-risk 20%</text>
  <text x="1312" y="351" text-anchor="middle" class="small">match action to risk signal</text>

  <path d="M 350 295 L 420 295" class="line" marker-end="url(#arrowhead)"/>
  <path d="M 705 295 L 775 295" class="line" marker-end="url(#arrowhead)"/>
  <path d="M 1075 295 L 1145 295" class="line" marker-end="url(#arrowhead)"/>

  <text x="112" y="480" class="section">What the model learns from</text>
  <g>
    <rect x="115" y="515" width="280" height="48" rx="24" fill="#e0f2fe" stroke="#0369a1" stroke-width="2"/>
    <text x="255" y="546" text-anchor="middle" class="chip">usage decline</text>
    <rect x="430" y="515" width="285" height="48" rx="24" fill="#dcfce7" stroke="#15803d" stroke-width="2"/>
    <text x="572" y="546" text-anchor="middle" class="chip">equipment age</text>
    <rect x="750" y="515" width="290" height="48" rx="24" fill="#fef3c7" stroke="#b45309" stroke-width="2"/>
    <text x="895" y="546" text-anchor="middle" class="chip">revenue pressure</text>
    <rect x="1075" y="515" width="285" height="48" rx="24" fill="#fee2e2" stroke="#b91c1c" stroke-width="2"/>
    <text x="1218" y="546" text-anchor="middle" class="chip">service friction</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="115" y="640" width="310" height="125" rx="18" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
    <rect x="475" y="640" width="310" height="125" rx="18" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
    <rect x="835" y="640" width="310" height="125" rx="18" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
    <rect x="1195" y="640" width="310" height="125" rx="18" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  </g>

  <text x="270" y="690" text-anchor="middle" class="metric">0.7023</text>
  <text x="270" y="728" text-anchor="middle" class="small">test ROC-AUC</text>
  <text x="630" y="690" text-anchor="middle" class="metric">0.6949</text>
  <text x="630" y="728" text-anchor="middle" class="small">test PR-AUC</text>
  <text x="990" y="690" text-anchor="middle" class="metric">30.1%</text>
  <text x="990" y="728" text-anchor="middle" class="small">churn captured in top 20%</text>
  <text x="1350" y="690" text-anchor="middle" class="metric">1.51x</text>
  <text x="1350" y="728" text-anchor="middle" class="small">top-risk lift</text>

  <text x="92" y="835" class="tiny">GitHub: github.com/hirokr/AI-Powered-Telecom-Churn-Prevention</text>
</svg>
