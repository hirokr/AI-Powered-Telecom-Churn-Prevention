<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080" role="img" aria-labelledby="title desc">
  <title id="title">Telecom Churn Prevention Results Card</title>
  <desc id="desc">A LinkedIn square graphic summarizing the project purpose, model technique, and measured outcome.</desc>
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      text { font-family: Arial, Helvetica, sans-serif; }
      .eyebrow { font-weight: 700; font-size: 27px; fill: #047857; letter-spacing: 2px; }
      .title { font-weight: 700; font-size: 57px; fill: #102a43; }
      .subtitle { font-weight: 400; font-size: 27px; fill: #52606d; }
      .label { font-weight: 700; font-size: 24px; fill: #334e68; }
      .body { font-weight: 400; font-size: 24px; fill: #52606d; }
      .metric { font-weight: 700; font-size: 54px; fill: #102a43; }
      .metricLabel { font-weight: 700; font-size: 22px; fill: #047857; }
      .tech { font-weight: 700; font-size: 25px; fill: #1f2933; }
      .small { font-weight: 400; font-size: 19px; fill: #627d98; }
      .box { stroke-width: 3; rx: 24; }
    </style>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#102a43" flood-opacity="0.13"/>
    </filter>
  </defs>

  <rect class="bg" width="1080" height="1080"/>
  <path d="M 0 0 H 1080 V 185 C 820 115 657 235 447 172 C 266 118 136 147 0 218 Z" fill="#dbeafe"/>
  <circle cx="940" cy="96" r="94" fill="#bbf7d0"/>
  <circle cx="88" cy="1010" r="150" fill="#fed7aa"/>

  <text x="76" y="92" class="eyebrow">GCI WORLD 2026 SPRING FINAL</text>
  <text x="76" y="170" class="title">AI-Powered</text>
  <text x="76" y="235" class="title">Telecom Churn</text>
  <text x="76" y="300" class="title">Prevention</text>
  <text x="78" y="353" class="subtitle">Turning customer behavior data into targeted retention action</text>

  <g filter="url(#shadow)">
    <rect x="78" y="430" width="286" height="178" class="box" fill="#ffffff" stroke="#cbd5e1"/>
    <rect x="397" y="430" width="286" height="178" class="box" fill="#ffffff" stroke="#cbd5e1"/>
    <rect x="716" y="430" width="286" height="178" class="box" fill="#ffffff" stroke="#cbd5e1"/>
  </g>

  <text x="221" y="500" text-anchor="middle" class="metric">0.7023</text>
  <text x="221" y="548" text-anchor="middle" class="metricLabel">ROC-AUC</text>
  <text x="540" y="500" text-anchor="middle" class="metric">0.6949</text>
  <text x="540" y="548" text-anchor="middle" class="metricLabel">PR-AUC</text>
  <text x="859" y="500" text-anchor="middle" class="metric">30.1%</text>
  <text x="859" y="548" text-anchor="middle" class="metricLabel">CHURN CAPTURED</text>

  <g filter="url(#shadow)">
    <rect x="78" y="674" width="426" height="220" class="box" fill="#ecfdf5" stroke="#047857"/>
    <rect x="576" y="674" width="426" height="220" class="box" fill="#fff7ed" stroke="#c2410c"/>
  </g>

  <text x="110" y="732" class="label">Why I built it</text>
  <text x="110" y="780" class="body">Help a telecom provider identify</text>
  <text x="110" y="814" class="body">customers likely to leave and</text>
  <text x="110" y="848" class="body">prioritize high-value retention</text>
  <text x="110" y="882" class="body">campaigns before churn happens.</text>

  <text x="608" y="732" class="label">Techniques used</text>
  <text x="608" y="780" class="tech">Feature engineering</text>
  <text x="608" y="816" class="tech">LightGBM + CatBoost ensemble</text>
  <text x="608" y="852" class="tech">Risk ranking and lift analysis</text>

  <rect x="78" y="942" width="924" height="64" rx="32" fill="#102a43"/>
  <text x="540" y="982" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-weight="700" font-size="23">github.com/hirokr/AI-Powered-Telecom-Churn-Prevention</text>
  <text x="78" y="1038" class="small">Outcome: top 20% risk segment captured 30.1% of churners with 1.51x lift.</text>
</svg>
